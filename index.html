<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HELL LET LOOSE ITALIA</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon.jpg">
  <!-- Bootstrap CSS -->
  <link href="assets/css/bootstrap@533.min.css" rel="stylesheet">
  <!-- CSS personalizzato -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-light">
    <div class="container-fluid">
      <!-- Logo a sinistra -->
      <a class="navbar-brand" href="#">
        <img src="assets/img/logo-black.png" alt="Logo" class="logo-navbar">
      </a>      

      <!-- Bottone per menu mobile -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Link a destra -->
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Sez. Console</a>
          </li>
          <li class="nav-item">
            <a class="nav-link">Sez. Pc</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Chi siamo</a>
          </li>
          <li class="nav-item">
            <a href="https://discord.gg/nZfm3s9" class="btn btn-primary ms-lg-3" role="button">Join Us</a>
          </li>
        </ul>        
      </div>
    </div>
  </nav>

  <!-- Hero statico -->
  <div class="hero-container">
    <div class="hero-content text-center">
      <h1 class="hero-title">Benvenuti su Hell Let Loose Italia</h1>
      <p class="hero-text">roba a caso da scrivere sotto</p>
    </div>
  </div>

  <!-- Contenuto principale -->
  <div class="container my-5">
    <!-- Hero dinamico del match -->
    <div id="main-match" class="p-5 text-center rounded position-relative main-hero" style="background-image: url('assets/img/slide2.jpg'); background-size: cover;">
      <div class="overlay"></div>
      <div class="position-relative">
        <h5 class="text-uppercase">Nome Torneo</h5>
        <h1 class="fw-bold" id="match-title">Match</h1>
        <div class="my-3 d-flex justify-content-center align-items-center gap-4">
          <img id="team1-logo" src="assets/img/logo-ita.jpg" alt="Team1" height="60">
          <div>
            <img id="vs" src="assets/img/vs.png" alt="vs" height="60"><br>
            <span class="countdown fs-5">
              <span id="Giorni">00</span> Giorni
              <span id="Ore">00</span> Ore
              <span id="Minuti">00</span> Minuti
              <span id="Secondi">00</span> Secondi
            </span>
          </div>
          <img id="team2-logo" src="assets/img/logo-ita.jpg" alt="Team2" height="60">
        </div>
        <button class="btn btn-light mt-3">Segui la live !!!</button>
      </div>
    </div>

    <!-- Lista delle partite -->
    <div class="row mt-4" id="matches-list">
      <!-- Le card verranno inserite da JS qui-->
    </div>
  </div>
  
  <!-- Bootstrap JS Bundle -->
  <script src="assets/js/bootstrap@533.bundle.min.js" defer></script>
  <!-- JavaScript personalizzato -->
  <script src="assets/js/script.js" defer></script>
</body>
</html>
